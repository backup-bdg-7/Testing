name: Analyze DyLib Files

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  analyze:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up analysis environment
      run: |
        mkdir -p analysis_output
        chmod +x ./analyze_dylib.sh
        
    - name: Run DyLib analysis
      run: ./analyze_dylib.sh
      
    - name: Upload analysis results
      uses: actions/upload-artifact@v4
      with:
        name: dylib-analysis-results
        path: analysis_output/
        if-no-files-found: warn

